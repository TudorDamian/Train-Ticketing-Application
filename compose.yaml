services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./traintickets
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-traintickets}
      - POSTGRES_USER=${POSTGRES_USER:-traintickets}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-traintickets}
      - MAIL_HOST=${MAIL_HOST:-localhost}
      - MAIL_PORT=${MAIL_PORT:-25}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-false}
      - MAIL_SMTP_STARTTLS_ENABLE=${MAIL_SMTP_STARTTLS_ENABLE:-false}
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - MAIL_FROM=${MAIL_FROM:-no-reply@traintickets.local}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-traintickets}
      - POSTGRES_USER=${POSTGRES_USER:-traintickets}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-traintickets}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traintickets} -d ${POSTGRES_DB:-traintickets}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

